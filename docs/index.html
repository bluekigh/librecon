<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/librecon/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="librecon">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>librecon</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- include tesseract.js from CDN for OCR (optional) -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <script>
    // placeholder JS interop: accepts Blob and returns recognized text
    window.recognizeImage = async function(blob) {
      console.log('recognizeImage called');
      if (typeof Tesseract !== 'undefined') {
        console.log('Tesseract available, starting recognition');
        try {
          const { data: { text } } = await Tesseract.recognize(blob, 'kor');
          console.log('OCR result:', text);
          return text;
        } catch (err) {
          console.error('OCR error', err);
          return '';
        }
      }
      console.warn('Tesseract not loaded');
      return '';
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
