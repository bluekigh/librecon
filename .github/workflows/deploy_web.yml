name: Build and Deploy Web

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false # do not store GITHUB_TOKEN in git config
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Determine build version
        id: version
        run: |
          if [ -f build_version.txt ]; then
            ver=$(cat build_version.txt)
          else
            ver=0
          fi
          new=$((ver+1))
          echo $new > build_version.txt
          echo "::set-output name=number::$new"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build_version.txt
          git commit -m "Bump build version to ${{ steps.version.outputs.number }} [skip ci]" || echo "no change"
          git push origin HEAD:main

      - name: Build web
        run: flutter build web --base-href "/librecon/" --dart-define=BUILD_VERSION=${{ steps.version.outputs.number }}

      - name: Copy build to docs
        run: |
          rm -rf docs
          mkdir docs
          cp -r build/web/* docs/

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs
          git commit -m "Deploy web to docs [skip ci]" || echo "nothing to commit"
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
